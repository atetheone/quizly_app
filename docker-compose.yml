services:
  db:
    image: postgres:16-alpine
    container_name: quizly-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: quizly
      POSTGRES_PASSWORD: quizly_dev
      POSTGRES_DB: quizly
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: